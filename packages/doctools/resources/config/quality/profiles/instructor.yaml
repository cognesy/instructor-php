version: 1
rules:
  - id: instructor.no_old_package_name_require
    engine: regex
    scope: markdown
    pattern: '/\bcomposer\s+require\s+cognesy\/instructor-php\b/'
    message: 'Install the core package with `composer require cognesy/instructor-struct`.'

  - id: instructor.no_old_package_name_update
    engine: regex
    scope: markdown
    pattern: '/\bcomposer\s+update\s+cognesy\/instructor-php\b/'
    message: 'Update the core package with `composer update cognesy/instructor-struct`.'

  - id: instructor.no_structuredoutput_withconfig
    engine: regex
    scope: markdown
    pattern: '/\bStructuredOutput::withConfig\s*\(/'
    message: 'StructuredOutput has no withConfig(...) factory. Use StructuredOutput::fromConfig(...), StructuredOutput::using(...), or StructuredOutputRuntime::withConfig(...).'

  - id: instructor.no_structuredoutput_fromprovider
    engine: regex
    scope: markdown
    pattern: '/\bStructuredOutput::fromProvider\s*\(/'
    message: 'StructuredOutput has no fromProvider(...) factory. Use StructuredOutputRuntime::fromProvider(...), then inject it with new StructuredOutput($runtime) or ->withRuntime(...).'

  - id: instructor.no_structuredoutput_fromdsn
    engine: regex
    scope: markdown
    pattern: '/\bStructuredOutput::fromDsn\s*\(/'
    message: 'StructuredOutput has no fromDsn(...) factory. Build an LLMConfig with LLMConfig::fromDsn(...), then use StructuredOutput::fromConfig(...) or StructuredOutputRuntime::fromConfig(...).'

  - id: instructor.no_structuredoutputruntime_fromdsn
    engine: regex
    scope: markdown
    pattern: '/\bStructuredOutputRuntime::fromDsn\s*\(/'
    message: 'Use LLMConfig::fromDsn(...), then pass StructuredOutputRuntime::fromConfig(...) into StructuredOutput.'

  - id: instructor.no_structuredoutputruntime_using
    engine: regex
    scope: markdown
    pattern: '/\bStructuredOutputRuntime::using\s*\(/'
    message: 'StructuredOutputRuntime has no using(...) shortcut. Use StructuredOutput::using(...), or build the runtime with StructuredOutputRuntime::fromConfig(LLMConfig::fromPreset(...)).'

  - id: instructor.no_structuredoutput_fromruntime
    engine: regex
    scope: markdown
    pattern: '/\bStructuredOutput::fromRuntime\s*\(/'
    message: 'StructuredOutput has constructor/runtime injection, not StructuredOutput::fromRuntime(...).'

  - id: instructor.no_structuredoutput_registerdriver
    engine: regex
    scope: markdown
    pattern: '/\bStructuredOutput::registerDriver\s*\(/'
    message: 'Driver registration belongs to lower-level HTTP/Polyglot layers, not StructuredOutput facade.'

  - id: instructor.no_inference_text
    engine: regex
    scope: markdown
    pattern: '/\bInference::text\s*\(/'
    message: 'Use (new Inference())->with(...)->get() or response()/asJson()/stream() depending on needed output.'

  - id: instructor.no_provider_type_key
    engine: regex
    scope: markdown
    pattern: '/\bproviderType\b/'
    message: 'Configuration key is `driver`, not `providerType`.'

  - id: instructor.no_structuredoutput_create_static
    engine: regex
    scope: markdown
    pattern: '/\bStructuredOutput::create\s*\(/'
    message: 'Use `(new StructuredOutput)->with(...)->get()` or `->create()` on an instance.'

  - id: instructor.no_withllmconfigoverrides
    engine: regex
    scope: markdown
    pattern: '/\bwithLLMConfigOverrides\s*\(/'
    message: 'Use `withConfigOverrides(...)` on LLMProvider.'

  - id: instructor.no_instructor_facade
    engine: regex
    scope: markdown
    pattern: '/\bFacades\\\\Instructor\b/'
    message: 'There is no Instructor facade. Use `Cognesy\Instructor\Laravel\Facades\StructuredOutput` instead.'

  - id: instructor.no_instructor_static_call
    engine: regex
    scope: markdown
    pattern: '/\bInstructor::(respond|with|create)\s*\(/'
    message: 'Instructor has no static facade methods. Use `StructuredOutput::with(...)` or `(new StructuredOutput)->with(...)` instead.'
